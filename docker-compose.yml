version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productapi-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1433:1433"

  api:
    build:
      context: ./src
      dockerfile: API/Dockerfile
    container_name: productapi-api
    depends_on:
      - sqlserver
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ProductApiAssessmentDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;"